<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Verify Email -- Forge</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0a0f;--surface:#111118;--border:#1e1e2e;--text:#e8e8f0;--muted:#6b6b88;--accent:#ff6b35;--ready:#22c55e;--font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.logo{font-family:var(--font-display);font-size:20px;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:8px;margin-bottom:40px;text-decoration:none;color:var(--text);}
.logo-flame{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),#ff9a56);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:420px;text-align:center;}
.icon{font-size:48px;margin-bottom:16px;}
.card-title{font-family:var(--font-display);font-size:24px;font-weight:800;margin-bottom:8px;}
.card-sub{color:var(--muted);font-size:14px;margin-bottom:24px;}
.btn{font-family:var(--font-body);font-size:15px;font-weight:600;border:none;cursor:pointer;border-radius:10px;padding:13px 20px;width:100%;transition:all .15s;text-decoration:none;display:block;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#ff7f4f;}
</style>
</head>
<body>
<a href="/" class="logo"><div class="logo-flame">🔥</div>Forge</a>
<div class="card">
  <div class="icon" id="statusIcon">⏳</div>
  <div class="card-title" id="statusTitle">Verifying your email...</div>
  <div class="card-sub" id="statusSub">Please wait a moment.</div>
  <a href="/perspectives.html" class="btn btn-primary" id="ctaBtn" style="display:none">Go to Forge →</a>
</div>
<script>
(async function() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const email = params.get('email');
  const icon = document.getElementById('statusIcon');
  const title = document.getElementById('statusTitle');
  const sub = document.getElementById('statusSub');
  const btn = document.getElementById('ctaBtn');

  if (!token || !email) {
    icon.textContent = '❌';
    title.textContent = 'Invalid link';
    sub.textContent = 'This verification link is missing required information.';
    return;
  }

  try {
    const r = await fetch('https://api.projectcoachai.com/api/auth/verify-email?token=' + token + '&email=' + encodeURIComponent(email));
    const data = await r.json();
    if (data.success) {
      icon.textContent = '✅';
      title.textContent = 'Email verified!';
      sub.textContent = 'Your Forge account is now fully activated.';
      btn.style.display = 'block';
    } else {
      icon.textContent = '❌';
      title.textContent = 'Verification failed';
      sub.textContent = data.error || 'This link may have expired. Please request a new one.';
    }
  } catch(e) {
    icon.textContent = '❌';
    title.textContent = 'Something went wrong';
    sub.textContent = 'Please try again or contact support.';
  }
})();
</script>
</body>
</html>

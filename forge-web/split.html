<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Forge — Split</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#09090f;--surface:#111118;--border:#1a1a2e;--text:#e8e8f0;--muted:#6b6b88;--accent:#ff6b35}
body[data-theme="slate"]{--bg:#0c0d10;--surface:#141520;--border:#20222e;--text:#d8dae8;--muted:#585a78}
body[data-theme="forest"]{--bg:#0a0f0a;--surface:#111811;--border:#1a2e1a;--text:#e0f0e0;--muted:#507050;--accent:#4caf50}
body[data-theme="ember"]{--bg:#0f0a06;--surface:#1a1208;--border:#2e1e0a;--text:#f8ede0;--muted:#806040;--accent:#f59e0b}
body[data-theme="light"]{--bg:#f8f9fc;--surface:#ffffff;--border:#e2e4ee;--text:#111122;--muted:#8888a0}
body[data-theme="sand"]{--bg:#faf7f2;--surface:#fff8ee;--border:#e8dcc8;--text:#2a2018;--muted:#9a8878;--accent:#d4640a}
body[data-theme="midnight"]{--bg:#0a0a1a;--surface:#10102a;--border:#1e1e3e;--text:#e0e0ff;--muted:#6060a0;--accent:#7c6bff}
body[data-theme="plum"]{--bg:#0f0810;--surface:#180d1a;--border:#2e1a30;--text:#f0e0f8;--muted:#806090;--accent:#c084fc}
html{height:100%}body{min-height:100%;min-height:100dvh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;display:flex;flex-direction:column;overflow-x:hidden;max-width:100vw}
.sp-header{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sp-logo{width:22px;height:22px;background:linear-gradient(135deg,#ff6b35,#ff9a56);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;font-family:'Syne',sans-serif}
.sp-title{font-size:13px;font-weight:700;color:var(--text);flex:1}
.sp-back{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none;transition:all .15s}
.sp-back:hover{border-color:var(--accent);color:var(--accent)}
.sp-clear{background:none;border:none;color:var(--muted);font-size:10px;cursor:pointer;padding:0 4px;font-family:inherit;transition:color .15s}
.sp-clear:hover{color:var(--accent)}
.sp-mode{font-size:11px;color:var(--accent);font-weight:600}
.theme-btn{background:none;border:none;font-size:13px;cursor:pointer;padding:2px 4px;color:var(--muted)}
.sp-providers{display:flex;gap:6px;padding:10px 14px;flex-wrap:wrap;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg)}
.sp-providers-label{width:100%;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.sp-chip{padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;font-family:inherit}
.sp-chip:hover{border-color:var(--accent);color:var(--text)}
.sp-chip.active{background:rgba(255,255,255,.06)}
.sp-chip-dot{width:6px;height:6px;border-radius:50%}
.sp-response{flex:1;overflow-y:auto;padding:14px;line-height:1.65;font-size:13px;color:var(--text)}
.sp-response::-webkit-scrollbar{width:4px}
.sp-response::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sp-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--muted);text-align:center;padding:20px}
.sp-empty-icon{font-size:28px;opacity:.6}
.sp-empty-text{font-size:13px;line-height:1.5}
.sp-history-item{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.sp-history-item:last-child{border-bottom:none;margin-bottom:0}
.sp-question{font-size:12px;font-weight:700;color:var(--text);margin-bottom:10px;padding:8px 10px;background:var(--surface);border-radius:6px;border-left:3px solid var(--accent)}
.sp-provider-label{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.sp-provider-dot{width:7px;height:7px;border-radius:50%}
.sp-response-text{word-break:break-word;font-size:13px}
.sp-response-text h3{color:var(--text);font-weight:700;margin:10px 0 4px;font-size:13px}
.sp-response-text strong{color:var(--text);font-weight:700}
.sp-response-text ul,.sp-response-text ol{padding-left:18px;margin:4px 0}
.sp-response-text li{margin:2px 0}
.sp-response-text p{margin:6px 0}
.sp-trust{display:flex;align-items:center;gap:5px;padding:6px 0 2px;font-size:10px;color:var(--muted)}
.sp-trust-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sp-input-area{padding:10px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;flex-shrink:0;background:var(--bg)}
.sp-recent{display:none;flex-wrap:wrap;gap:4px}
.sp-recent-chip{background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--muted);font-size:10px;padding:3px 8px;cursor:pointer;font-family:inherit;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all .15s}
.sp-recent-chip:hover{border-color:var(--accent);color:var(--text)}
.sp-lib-actions{display:flex;gap:6px}
.sp-lib-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:10px;font-weight:600;padding:4px 8px;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.sp-lib-btn:hover{border-color:var(--accent);color:var(--accent)}
.sp-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:12px;padding:8px 10px;resize:none;outline:none;transition:border-color .15s;line-height:1.5;min-height:36px;max-height:120px;overflow-y:auto}
@media(max-width:600px){
  /* Fixed input area — stays above keyboard */
  .sp-input-area{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    z-index:50;
    padding:8px 10px;
    gap:4px;
    background:var(--bg);
    border-top:1px solid var(--border);
    box-shadow:0 -4px 16px rgba(0,0,0,0.3);
  }
  /* Response area gets bottom padding so content isn't hidden behind input */
  .sp-response{
    padding:10px 10px 180px;
    overflow-x:hidden;
    word-break:break-word;
    flex:1;
  }
  /* Provider chips horizontal scroll */
  .sp-providers{padding:6px 10px;gap:4px;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .sp-chip{padding:3px 7px;font-size:10px;flex-shrink:0}
  /* Input full width */
  .sp-input{width:100%;box-sizing:border-box;max-width:100%;font-size:16px}
  .sp-send{padding:8px 10px;font-size:12px;width:100%;box-sizing:border-box}
  /* Library buttons compact */
  .sp-lib-actions{display:flex;gap:4px}
  .sp-lib-btn{font-size:10px;padding:3px 6px}
  /* Recent prompts horizontal scroll */
  .sp-recent{display:flex!important;flex-direction:row!important;overflow-x:auto!important;overflow-y:hidden!important;flex-wrap:nowrap!important;gap:4px;padding-bottom:2px;-webkit-overflow-scrolling:touch}
  .sp-recent-chip{flex-shrink:0;max-width:140px}
}
@media(max-height:500px) and (orientation:landscape){
  .sp-providers{padding:4px 10px;gap:3px;max-height:48px;overflow-x:auto;flex-wrap:nowrap}
  .sp-chip{flex-shrink:0}
  .sp-input-area{padding:4px 10px;gap:3px}
  .sp-response{padding:8px 10px}
}
.sp-input:focus{border-color:var(--accent)}
.sp-input::placeholder{color:var(--muted)}
.sp-send{background:linear-gradient(135deg,#ff6b35,#ff9a56);border:none;border-radius:6px;color:#fff;font-size:12px;font-weight:700;padding:7px 14px;cursor:pointer;width:100%;transition:opacity .15s;font-family:inherit}
.sp-send:hover{opacity:.9}
.sp-send:disabled{opacity:.4;cursor:not-allowed}
.sp-status{font-size:10px;color:var(--muted);text-align:center}
.sp-lib-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;align-items:center;justify-content:center;padding:16px}
.sp-lib-modal.open{display:flex}
.sp-lib-modal-inner{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:100%;max-width:400px;max-height:70vh;display:flex;flex-direction:column;overflow:hidden}
.sp-lib-modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:700}
.sp-lib-modal-close{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer}
.sp-lib-list{overflow-y:auto;padding:8px;flex:1}
.sp-lib-item{padding:10px 12px;border-radius:6px;font-size:12px;color:var(--text);cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border);line-height:1.4}
.sp-lib-item:hover{background:var(--border)}
.sp-lib-item:last-child{border-bottom:none}
.theme-picker{display:none;position:fixed;top:48px;right:8px;z-index:999;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;flex-wrap:wrap;gap:6px;width:180px}
.theme-picker.open{display:flex}
.theme-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s}
.theme-swatch:hover{transform:scale(1.15)}
</style>
<link rel="stylesheet" href="/forge-mobile.css">
</head>
<body data-theme="dark">
<div class="sp-header">
  <div class="sp-logo">F</div>
  <span class="sp-title">Forge Split</span>
  <a href="/perspectives.html" class="sp-back">← Back</a>
  <button class="sp-clear" id="spClear">✕ Clear</button>
  <span class="sp-mode">◎ Perspective</span>
  <button class="theme-btn" id="themeBtn">🎨</button>
</div>
<div class="sp-providers" id="spProviders">
  <div class="sp-providers-label">Get a perspective from</div>
</div>
<div class="sp-response" id="spResponse">
  <div class="sp-empty">
    <div class="sp-empty-icon">◎</div>
    <div class="sp-empty-text">Select an AI above and ask your question to get a fresh perspective.</div>
  </div>
</div>
<div class="sp-input-area">
  <div class="sp-recent" id="spRecent"></div>
  <textarea class="sp-input" id="spInput" rows="2" placeholder="Ask for a perspective..."></textarea>
  <div class="sp-lib-actions">
    <button class="sp-lib-btn" id="spLibLoad">📚 Load from library</button>
    <button class="sp-lib-btn" id="spLibSave">💾 Save to library</button>
  </div>
  <button class="sp-send" id="spSend">Get Perspective →</button>
  <div class="sp-status" id="spStatus">Select a provider above to begin</div>
</div>
<div class="sp-lib-modal" id="spLibModal">
  <div class="sp-lib-modal-inner">
    <div class="sp-lib-modal-hdr">
      <span>📚 Prompt Library</span>
      <button class="sp-lib-modal-close" id="spLibClose">✕</button>
    </div>
    <div class="sp-lib-list" id="spLibList"></div>
  </div>
</div>
<div class="theme-picker" id="themePicker">
  <div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;width:100%;margin-bottom:4px">Dark</div>
  <button class="theme-swatch" data-theme="dark"     style="background:#09090f;border-color:#ff6b35"></button>
  <button class="theme-swatch" data-theme="slate"    style="background:#0c0d10;border-color:#94a3b8"></button>
  <button class="theme-swatch" data-theme="forest"   style="background:#0a0f0a;border-color:#4caf50"></button>
  <button class="theme-swatch" data-theme="ember"    style="background:#0f0a06;border-color:#f59e0b"></button>
  <div style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;width:100%;margin-top:6px;margin-bottom:4px">Light</div>
  <button class="theme-swatch" data-theme="light"    style="background:#f8f9fc;border-color:#ff6b35"></button>
  <button class="theme-swatch" data-theme="sand"     style="background:#faf7f2;border-color:#d4640a"></button>
  <button class="theme-swatch" data-theme="midnight" style="background:#0a0a1a;border-color:#7c6bff"></button>
  <button class="theme-swatch" data-theme="plum"     style="background:#0f0810;border-color:#c084fc"></button>
</div>
<script src="/js/forge-api.js"></script>
<script>
const API='https://api.projectcoachai.com';
const PROVIDERS=[
  {id:'claude',label:'Claude',color:'#d97706'},
  {id:'chatgpt',label:'ChatGPT',color:'#10a37f'},
  {id:'gemini',label:'Gemini',color:'#4285f4'},
  {id:'mistral',label:'Mistral',color:'#f59e0b'},
  {id:'deepseek',label:'DeepSeek',color:'#6366f1'},
  {id:'perplexity',label:'Perplexity',color:'#22c55e'},
  {id:'grok',label:'Grok',color:'#ec4899'},
  {id:'meta',label:'Meta AI',color:'#0866FF'}
];
const MAX_RECENT=5;
let selectedProvider=null,history=[],recentPrompts=[];
const chipsEl=document.getElementById('spProviders');
PROVIDERS.forEach(p=>{
  const chip=document.createElement('button');
  chip.className='sp-chip';chip.dataset.id=p.id;
  const dot=document.createElement('span');dot.className='sp-chip-dot';dot.style.background=p.color;
  chip.appendChild(dot);chip.appendChild(document.createTextNode(p.label));
  chip.addEventListener('click',()=>selectProvider(p));chipsEl.appendChild(chip);
});
function selectProvider(p){
  selectedProvider=p;
  document.querySelectorAll('.sp-chip').forEach(c=>{c.classList.remove('active');c.style.borderColor='';c.style.color='';});
  const chip=document.querySelector('.sp-chip[data-id="'+p.id+'"]');
  if(chip){chip.classList.add('active');chip.style.borderColor=p.color;chip.style.color=p.color;}
  document.getElementById('spStatus').textContent='Connected to '+p.label;
  if(history.length===0)showEmpty(p);
}
function showEmpty(p){
  document.getElementById('spResponse').innerHTML='<div class="sp-empty"><div class="sp-empty-icon" style="color:'+(p?p.color:'#f97316')+'">◎</div><div class="sp-empty-text">'+(p?'Ask '+p.label+' anything — your conversation history will appear here.':'Select an AI above to get started.')+'</div></div>';
}
function renderMd(text){
  const el=document.createElement('div');el.className='sp-response-text';
  const lines=text.trim().split('\n');let html='',inList=false,lt='ul';
  lines.forEach(line=>{
    if(/^#{1,3}\s/.test(line)){if(inList){html+='</'+lt+'>';inList=false;}html+='<h3>'+line.replace(/^#{1,3}\s/,'')+'</h3>';}
    else if(/^[\-\*]\s/.test(line)){if(!inList||lt!=='ul'){if(inList)html+='</'+lt+'>';html+='<ul>';inList=true;lt='ul';}html+='<li>'+line.replace(/^[\-\*]\s/,'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')+'</li>';}
    else if(/^\d+\.\s/.test(line)){if(!inList||lt!=='ol'){if(inList)html+='</'+lt+'>';html+='<ol>';inList=true;lt='ol';}html+='<li>'+line.replace(/^\d+\.\s/,'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')+'</li>';}
    else{if(inList){html+='</'+lt+'>';inList=false;}if(line.trim())html+='<p>'+line.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>')+'</p>';}
  });
  if(inList)html+='</'+lt+'>';el.innerHTML=html;return el;
}
function renderHistory(){
  const resp=document.getElementById('spResponse');resp.innerHTML='';
  history.forEach(item=>{
    const wrap=document.createElement('div');wrap.className='sp-history-item';
    if(item.prompt){const q=document.createElement('div');q.className='sp-question';q.style.borderLeftColor=item.provider.color;q.textContent=item.prompt;wrap.appendChild(q);}
    const lbl=document.createElement('div');lbl.className='sp-provider-label';
    const d=document.createElement('span');d.className='sp-provider-dot';d.style.background=item.provider.color;
    const n=document.createElement('span');n.style.color=item.provider.color;n.textContent=item.provider.label;
    lbl.appendChild(d);lbl.appendChild(n);wrap.appendChild(lbl);wrap.appendChild(renderMd(item.text));
    const trust=document.createElement('div');trust.className='sp-trust';
    const tdot=document.createElement('span');tdot.className='sp-trust-dot';tdot.style.background=item.provider.color;
    trust.appendChild(tdot);trust.appendChild(document.createTextNode('Answered via Forge · '+item.provider.label+' · '+item.time.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})));
    wrap.appendChild(trust);resp.appendChild(wrap);
  });
  resp.scrollTop=resp.scrollHeight;
}
function loadRecent(){try{recentPrompts=JSON.parse(localStorage.getItem('forge_split_recent')||'[]');renderRecent();}catch(_){}}
function saveRecent(text){recentPrompts=[text,...recentPrompts.filter(p=>p!==text)].slice(0,MAX_RECENT);try{localStorage.setItem('forge_split_recent',JSON.stringify(recentPrompts));}catch(_){}renderRecent();}
function renderRecent(){
  const el=document.getElementById('spRecent');
  if(!recentPrompts.length){el.style.display='none';return;}
  el.style.display='flex';el.innerHTML='';
  recentPrompts.forEach(p=>{
    const chip=document.createElement('button');chip.className='sp-recent-chip';chip.title=p;
    chip.textContent=p.length>28?p.slice(0,28)+'…':p;
    chip.addEventListener('click',()=>{document.getElementById('spInput').value=p;document.getElementById('spInput').focus();});
    el.appendChild(chip);
  });
}
document.getElementById('spClear').addEventListener('click',()=>{history=[];showEmpty(selectedProvider);document.getElementById('spStatus').textContent='Session cleared';});
const spInput=document.getElementById('spInput');
spInput.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';});

spInput.addEventListener('keydown',function(e){if((e.metaKey||e.ctrlKey)&&e.key==='Enter')sendPrompt();});
document.getElementById('spSend').addEventListener('click',sendPrompt);
async function sendPrompt(){
  if(!selectedProvider){document.getElementById('spStatus').textContent='Select a provider first';return;}
  const prompt=spInput.value.trim();if(!prompt)return;
  saveRecent(prompt);spInput.value='';spInput.style.height='auto';
  document.getElementById('spSend').disabled=true;
  document.getElementById('spStatus').textContent='Asking '+selectedProvider.label+'...';
  try{
    const token=Forge.getToken?Forge.getToken():localStorage.getItem('forge_token')||'';
    const r=await fetch(API+'/api/split',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({prompt,provider:selectedProvider.id})});
    const data=await r.json();
    document.getElementById('spSend').disabled=false;
    if(data.success&&data.content){history.push({provider:selectedProvider,text:data.content,prompt,time:new Date()});renderHistory();document.getElementById('spStatus').textContent=selectedProvider.label+' responded';}
    else{document.getElementById('spStatus').textContent='Error: '+(data.error||'No response');}
  }catch(e){document.getElementById('spSend').disabled=false;document.getElementById('spStatus').textContent='Request failed: '+e.message;}
}
document.getElementById('spLibLoad').addEventListener('click',async()=>{
  const token=Forge.getToken?Forge.getToken():localStorage.getItem('forge_token')||'';
  if(!token){document.getElementById('spStatus').textContent='Sign in to use library';return;}
  try{
    const r=await fetch(API+'/api/prompts',{headers:{'Authorization':'Bearer '+token}});
    const data=await r.json();const prompts=data.prompts||(data.data&&data.data.prompts)||[];
    if(!prompts.length){document.getElementById('spStatus').textContent='No prompts in library';return;}
    const list=document.getElementById('spLibList');list.innerHTML='';
    prompts.forEach(p=>{const item=document.createElement('div');item.className='sp-lib-item';item.textContent=p.text.length>80?p.text.slice(0,80)+'…':p.text;item.title=p.text;item.addEventListener('click',()=>{spInput.value=p.text;document.getElementById('spLibModal').classList.remove('open');});list.appendChild(item);});
    document.getElementById('spLibModal').classList.add('open');
  }catch(e){document.getElementById('spStatus').textContent='Failed to load library';}
});
document.getElementById('spLibSave').addEventListener('click',async()=>{
  const text=spInput.value.trim();if(!text){document.getElementById('spStatus').textContent='Type a prompt first';return;}
  const token=Forge.getToken?Forge.getToken():localStorage.getItem('forge_token')||'';
  if(!token){document.getElementById('spStatus').textContent='Sign in to save';return;}
  try{const r=await fetch(API+'/api/prompts',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({text,category:'Forge Split'})});const data=await r.json();document.getElementById('spStatus').textContent=data.success?'✓ Saved to library':'Save failed';}
  catch(e){document.getElementById('spStatus').textContent='Save failed';}
});
document.getElementById('spLibClose').addEventListener('click',()=>document.getElementById('spLibModal').classList.remove('open'));
document.getElementById('themeBtn').addEventListener('click',()=>document.getElementById('themePicker').classList.toggle('open'));
document.querySelectorAll('.theme-swatch').forEach(btn=>{btn.addEventListener('click',()=>{document.body.dataset.theme=btn.dataset.theme;localStorage.setItem('forge_split_theme',btn.dataset.theme);document.getElementById('themePicker').classList.remove('open');});});
const savedTheme=localStorage.getItem('forge_split_theme');if(savedTheme)document.body.dataset.theme=savedTheme;
loadRecent();
(async function(){if(typeof Forge!=='undefined'){const user=await Forge.restoreSession().catch(()=>null);if(!user)location.href='/signin.html?redirect=/split.html';}})();
</script>
</body>
</html>

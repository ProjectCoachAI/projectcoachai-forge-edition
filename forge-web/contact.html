<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contact -- Forge</title>
<link rel="stylesheet" href="/css/forge.css"/>

<style>
.app-header { display:flex; align-items:center; justify-content:space-between; padding:0 24px; height:56px; background:rgba(12,12,18,0.95); border-bottom:1px solid rgba(255,255,255,0.08); position:sticky; top:0; z-index:100; }
.logo { display:flex; align-items:center; gap:8px; font-weight:700; font-size:16px; color:#fff; text-decoration:none; }
.logo-flame { font-size:20px; }
.nav-tabs { display:flex; gap:4px; }
.nav-tab { padding:6px 12px; border-radius:8px; font-size:13px; color:rgba(255,255,255,0.6); text-decoration:none; transition:all .2s; }
.nav-tab:hover { color:#fff; background:rgba(255,255,255,0.08); }
.header-right .btn { padding:6px 14px; border-radius:8px; font-size:13px; background:#ff6b35; color:#fff; border:none; cursor:pointer; text-decoration:none; }
.forge-footer { padding:24px; text-align:center; border-top:1px solid rgba(255,255,255,0.08); margin-top:40px; }
.forge-footer .footer-links { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; }
.forge-footer a { color:rgba(255,255,255,0.4); text-decoration:none; font-size:13px; }
.forge-footer a:hover { color:#fff; }
.forge-footer .sep { color:rgba(255,255,255,0.2); }
</style>
</head>
<body>
<header class="header">
  <a href="/index.html" class="logo"><div class="logo-flame">&#128293;</div>Forge<span class="logo-sub">Full Decision Workspace</span></a>
  <nav class="nav-tabs">
    <a href="/index.html" class="nav-tab">Perspectives</a>
    <a href="/quick-chat.html" class="nav-tab">&#9889; Quick Answer</a>
    <a href="/synthesis.html" class="nav-tab">&#10022; Synthesis</a>
    <a href="/forge.html" class="nav-tab">&#10022;&#10022; Forge</a>
    <a href="/excel.html" class="nav-tab">&#128202; Excel</a>
  </nav>
  <div class="header-right" id="headerAuth"></div>
</header>
  <script src="/js/forge-api.js"></script>
  <script>
    (async function() {
  let user = Forge.getUser ? Forge.getUser() : null;
  if (!user && Forge.restoreSession) {
    user = await Forge.restoreSession().catch(() => null);
  }
  const el = document.getElementById("headerAuth");
  if (!el) return;
  if (user) {
    el.innerHTML = `<a href="/profile.html" class="btn btn-ghost" style="font-size:13px">&#128100; ${user.name||"Profile"}</a>`;
  } else {
    el.innerHTML = `<a href="/signin.html" class="btn btn-ghost" style="font-size:13px">Sign In</a><a href="/register.html" class="btn btn-primary" style="font-size:13px;margin-left:8px">Start Free</a>`;
  }
})();
  </script>

<main style="max-width:600px;margin:80px auto;padding:0 24px;text-align:center;">
  <h1 style="font-size:32px;font-weight:800;margin-bottom:16px;">Contact Us</h1>
  <p style="color:var(--muted);margin-bottom:32px;">Have a question or feedback? We'd love to hear from you.</p>
  <a href="mailto:support@projectcoachai.com" style="display:inline-block;padding:12px 28px;background:var(--accent);color:#fff;border-radius:10px;font-weight:700;text-decoration:none;">Email Support</a>
</main>
<footer class="forge-footer">
  <div class="footer-links">
    <a href="/pricing.html">Pricing</a><span class="sep">·</span>
    <a href="/why-forge.html">Why Forge</a><span class="sep">·</span>
    <a href="/help.html">Help</a><span class="sep">·</span>
    <a href="/contact.html">Contact</a><span class="sep">·</span>
    <a href="/profile.html">Profile</a><span class="sep">·</span>
    <a href="/privacy.html">Privacy</a><span class="sep">·</span>
    <a href="/terms.html">Terms</a>
  </div>
</footer>
</body>
</html>

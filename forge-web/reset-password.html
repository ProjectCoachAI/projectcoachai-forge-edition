<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password — Forge</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/css/forge.css"/>
<style>
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px;width:100%;max-width:400px;}
.auth-logo{display:flex;align-items:center;gap:8px;margin-bottom:24px;justify-content:center;}
.auth-title{font-family:var(--font-display);font-size:24px;font-weight:800;margin-bottom:8px;text-align:center;}
.auth-sub{font-size:14px;color:var(--muted);margin-bottom:24px;text-align:center;}
.form-group{margin-bottom:16px;}
.form-label{font-size:13px;color:var(--muted);font-weight:500;display:block;margin-bottom:6px;}
.form-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-family:var(--font-body);font-size:15px;color:var(--text);outline:none;transition:border-color .2s;box-sizing:border-box;}
.form-input:focus{border-color:var(--border-hi);}
.submit-btn{width:100%;padding:13px;border-radius:10px;background:var(--accent);color:#fff;font-family:var(--font-display);font-size:15px;font-weight:700;border:none;cursor:pointer;transition:background .15s;margin-top:8px;}
.submit-btn:hover{background:#ff7f4f;}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;}
.global-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:12px;font-size:14px;color:#ef4444;margin-bottom:16px;display:none;}
.global-error.show{display:block;}
.global-success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:10px;padding:12px;font-size:14px;color:var(--ready);margin-bottom:16px;display:none;}
.global-success.show{display:block;}
.pw-strength{height:3px;border-radius:999px;background:var(--border);margin-top:6px;overflow:hidden;}
.pw-strength-fill{height:100%;border-radius:999px;width:0%;transition:width .3s,background .3s;}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-flame">🔥</div>
      <span style="font-family:var(--font-display);font-size:20px;font-weight:800">Forge</span>
    </div>
    <h1 class="auth-title">Set new password</h1>
    <p class="auth-sub">Enter your new password below.</p>
    <div class="global-error" id="globalError"></div>
    <div class="global-success" id="globalSuccess"></div>
    <div class="form-group">
      <label class="form-label">New Password</label>
      <input class="form-input" type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password"/>
      <div class="pw-strength"><div class="pw-strength-fill" id="pwFill"></div></div>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <input class="form-input" type="password" id="confirm" placeholder="Repeat new password" autocomplete="new-password"/>
    </div>
    <button class="submit-btn" id="submitBtn">Set New Password</button>
  </div>
</div>
<script src="/js/forge-api.js"></script>
<script>
const params   = new URLSearchParams(window.location.search);
const email    = params.get('email') || '';
const token    = params.get('token') || '';
const pwInput  = document.getElementById('password');
const cfInput  = document.getElementById('confirm');
const submitBtn = document.getElementById('submitBtn');
const errEl    = document.getElementById('globalError');
const okEl     = document.getElementById('globalSuccess');

if (!email || !token) {
  errEl.textContent = 'Invalid reset link. Please request a new one.';
  errEl.classList.add('show');
  submitBtn.disabled = true;
}

pwInput.addEventListener('input', function() {
  const v = this.value;
  let score = 0;
  if (v.length >= 8)  score++;
  if (v.length >= 12) score++;
  if (/[A-Z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  const pct   = Math.min(100, score * 20);
  const color = pct < 40 ? '#ef4444' : pct < 70 ? '#f59e0b' : '#22c55e';
  document.getElementById('pwFill').style.width = pct + '%';
  document.getElementById('pwFill').style.background = color;
});

let _submitting = false;
submitBtn.addEventListener('click', async () => {
  if (_submitting) return;
  errEl.classList.remove('show');
  const pw = pwInput.value;
  const cf = cfInput.value;
  if (pw.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; errEl.classList.add('show'); return; }
  if (pw !== cf)     { errEl.textContent = 'Passwords do not match.'; errEl.classList.add('show'); return; }
  _submitting = true;
  submitBtn.disabled = true;
  submitBtn.textContent = 'Setting password…';
  const r = await Forge.auth.confirmPasswordReset(email, token, pw);
  if (r.ok) {
    okEl.textContent = 'Password updated! Redirecting to sign in…';
    okEl.classList.add('show');
    setTimeout(() => window.location.href = '/signin.html', 2000);
  } else {
    errEl.textContent = r.data?.error || 'Reset failed. Please request a new link.';
    errEl.classList.add('show');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Set New Password';
    _submitting = false;
  }
});
</script>
</body>
</html>

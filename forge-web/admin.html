<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - User Management | ProjectCoachAI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0f1e;
            --bg-card: #111827;
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --accent-orange: #ff6b35;
            --border-subtle: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            padding: 2rem;
        }

        .header {
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-secondary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 1.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-orange);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .users-table {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: rgba(255, 255, 255, 0.02);
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-subtle);
        }

        th {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        td {
            color: var(--text-primary);
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-admin {
            background: rgba(255, 107, 53, 0.2);
            color: var(--accent-orange);
        }

        .badge-user {
            background: rgba(156, 163, 175, 0.2);
            color: var(--text-secondary);
        }

        .search-box {
            margin-bottom: 1rem;
            padding: 0.75rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-primary);
            width: 100%;
            max-width: 400px;
        }

        .search-box::placeholder {
            color: var(--text-secondary);
        }

        .refresh-btn {
            background: var(--accent-orange);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 1rem;
        }

        .refresh-btn:hover {
            background: #ff8555;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .template-editor {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 2rem;
        }

        .template-editor h3 {
            margin-bottom: 1rem;
            font-size: 1.25rem;
            color: var(--text-primary);
        }

        .template-editor label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 0.35rem;
            color: var(--text-secondary);
        }

        .template-editor input,
        .template-editor textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-dark);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-primary);
            margin-bottom: 1rem;
            font-family: inherit;
            font-size: 0.95rem;
        }

        .template-status {
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        .template-status.success {
            color: #10b981;
        }

        .template-status.error {
            color: #f87171;
        }

        .template-save-btn {
            background: var(--accent-orange);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .template-save-btn:hover {
            background: #ff8555;
        }
    </style>

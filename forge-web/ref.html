<div class="msg">
  <div class="logo">🔥</div>
  <div style="font-size:18px;font-weight:600;">Taking you to Forge…</div>
  <p>Referral link recognised</p>
</div>
<script>
(function() {
  // Extract code from path: /ref/CODE or ?ref=CODE
  const pathParts = window.location.pathname.split('/');
  const code = pathParts[pathParts.length - 1] ||
               new URLSearchParams(window.location.search).get('ref') || '';

  if (code && code.length >= 4) {
    // Set 30-day cookie
    const exp = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toUTCString();
    document.cookie = 'forge_ref=' + encodeURIComponent(code.toUpperCase()) +
                      '; expires=' + exp + '; path=/; SameSite=Lax';

    // Log the click
    fetch('https://api.projectcoachai.com/api/referrals/track', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: code.toUpperCase() }),
    }).catch(() => {});
  }

  // Redirect to homepage after brief pause
  setTimeout(() => {
    window.location.href = '/';
  }, 800);
})();
</script>
</body>

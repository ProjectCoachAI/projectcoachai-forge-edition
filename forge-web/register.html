<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Create Account -- Forge</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0a0f;--surface:#111118;--border:#1e1e2e;--border-hi:#2a2a3e;--text:#e8e8f0;--muted:#6b6b88;--accent:#ff6b35;--ready:#22c55e;--font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.4;}
.logo{font-family:var(--font-display);font-size:20px;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:8px;margin-bottom:40px;text-decoration:none;color:var(--text);}
.logo-flame{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),#ff9a56);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:420px;}
.card-title{font-family:var(--font-display);font-size:24px;font-weight:800;margin-bottom:6px;letter-spacing:-.5px;}
.card-sub{color:var(--muted);font-size:14px;margin-bottom:32px;}
.form-group{margin-bottom:18px;}
label{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:6px;}
.input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-family:var(--font-body);font-size:15px;color:var(--text);outline:none;transition:border-color .2s;}
.input::placeholder{color:var(--muted);}
.input:focus{border-color:var(--border-hi);}
.input.error-field{border-color:rgba(239,68,68,.5);}
.input-wrap{position:relative;}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:4px;}
.error-msg{color:#ef4444;font-size:12px;margin-top:5px;display:none;}
.error-msg.show{display:block;}
.btn{font-family:var(--font-body);font-size:15px;font-weight:600;border:none;cursor:pointer;border-radius:10px;padding:13px 20px;width:100%;transition:all .15s;}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 0 20px rgba(255,107,53,.3);}
.btn-primary:hover{background:#ff7f4f;}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;box-shadow:none;}
.divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:var(--muted);font-size:13px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.link{color:var(--accent);text-decoration:none;font-size:14px;}
.link:hover{text-decoration:underline;}
.footer-text{text-align:center;font-size:14px;color:var(--muted);margin-top:20px;}
.global-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:12px 16px;font-size:14px;color:#ef4444;margin-bottom:20px;display:none;}
.global-error.show{display:block;}
.perks{display:flex;flex-direction:column;gap:8px;margin-bottom:28px;}
.perk{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);}
.perk-icon{color:var(--ready);font-size:14px;}
.pw-strength{height:3px;background:var(--border);border-radius:999px;margin-top:6px;overflow:hidden;}
.pw-strength-fill{height:100%;border-radius:999px;transition:width .3s,background .3s;}

input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus {
  -webkit-box-shadow: 0 0 0px 1000px #1a1a2e inset !important;
  -webkit-text-fill-color: #ffffff !important;
  caret-color: #ffffff !important;
}
</style>
</head>
<body>
<a href="/index.html" class="logo">
  <div class="logo-flame">🔥</div>
  Forge
</a>

<div class="card">
  <div class="card-title">Create your account</div>
  <div class="card-sub">Free forever. Connect your own AI subscriptions.</div>

  <div class="perks">
    <div class="perk"><span class="perk-icon">✓</span> Get perspectives from 7 AI providers</div>
    <div class="perk"><span class="perk-icon">✓</span> 30 synthesis analyses per month, free</div>
    <div class="perk"><span class="perk-icon">✓</span> Your own API keys -- your data stays yours</div>
  </div>

  <div class="global-error" id="globalError"></div>

  <div class="form-group">
    <label for="name">Full name</label>
    <input class="input" type="text" id="name" placeholder="Daniel Jones" autocomplete="name" required/>
    <div class="error-msg" id="nameError"></div>
  </div>

  <div class="form-group">
    <label for="email">Email</label>
    <input class="input" type="email" id="email" placeholder="you@example.com" autocomplete="email" required/>
    <div class="error-msg" id="emailError"></div>
  </div>

  <div class="form-group">
    <label for="password">Password <span style="font-weight:400;color:var(--muted)">(min. 8 characters)</span></label>
    <div class="input-wrap">
      <input class="input" type="password" id="password" placeholder="********" autocomplete="new-password" required/>
      <button class="pw-toggle" type="button" id="pwToggle">👁</button>
    </div>
    <div class="pw-strength" id="pwStrength"><div class="pw-strength-fill" id="pwStrengthFill" style="width:0%"></div></div>
    <div class="error-msg" id="passwordError"></div>
  </div>

  <button class="btn btn-primary" id="submitBtn">Create Free Account</button>

  <div class="divider">already have an account?</div>

  <a href="/signin.html" class="btn" style="display:block;text-align:center;background:transparent;border:1px solid var(--border);color:var(--muted);text-decoration:none;">Sign In</a>
</div>

<script src="/js/forge-api.js"></script>
<script>
// Only redirect if we have BOTH a token AND the backend confirms it
(async function(){ 
  if (Forge.getToken()) {
    const u = await Forge.auth.me();
    if (u) window.location.href = '/index.html';
  }
})();

const nameInput  = document.getElementById('name');
const emailInput = document.getElementById('email');
const pwInput    = document.getElementById('password');
const submitBtn  = document.getElementById('submitBtn');
const globalErr  = document.getElementById('globalError');

function showErr(msg){ globalErr.textContent=msg; globalErr.classList.add('show'); }
function clearErr()  { globalErr.classList.remove('show'); }

// Password strength
pwInput.addEventListener('input', function(){
  const v = this.value;
  const fill = document.getElementById('pwStrengthFill');
  let score = 0;
  if (v.length >= 8)  score++;
  if (v.length >= 12) score++;
  if (/[A-Z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  const pct   = Math.min(100, score * 20);
  const color = pct < 40 ? '#ef4444' : pct < 70 ? '#f59e0b' : '#22c55e';
  fill.style.width     = pct + '%';
  fill.style.background = color;
});

document.getElementById('pwToggle').addEventListener('click', function(){
  const t = pwInput.type === 'password' ? 'text' : 'password';
  pwInput.type = t; this.textContent = t === 'password' ? '👁' : '🙈';
});

async function handleRegister(){
  clearErr();
  const name     = nameInput.value.trim();
  const email    = emailInput.value.trim();
  const password = pwInput.value;
  if (!name)           { showErr('Please enter your name.'); return; }
  if (!email)          { showErr('Please enter your email.'); return; }
  if (password.length < 8) { showErr('Password must be at least 8 characters.'); return; }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Creating account...';

  const r = await Forge.auth.register(name, email, password);
  if (r.ok) {
    Forge.showToast('Account created! Redirecting...', 'success');
    setTimeout(() => window.location.href = '/index.html', 600);
  } else {
    showErr(r.data?.error || 'Registration failed. Please try again.');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Create Free Account';
  }
}

submitBtn.addEventListener('click', handleRegister);
[nameInput, emailInput, pwInput].forEach(el => el.addEventListener('keydown', e => { if(e.key==='Enter') handleRegister(); }));
</script>

<footer style="text-align:center;padding:16px;font-size:12px;color:rgba(255,255,255,0.4)">
  <a href="/privacy.html" style="color:rgba(255,255,255,0.4);text-decoration:none;margin:0 8px">Privacy</a>
  <span style="opacity:0.3">&#183;</span>
  <a href="/terms.html" style="color:rgba(255,255,255,0.4);text-decoration:none;margin:0 8px">Terms</a>
</footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forge â€” Quick Answer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:       #0a0a0f;
  --surface:  #111118;
  --border:   #1e1e2e;
  --border-hi: #2a2a3e;
  --text:     #e8e8f0;
  --muted:    #6b6b88;
  --accent:   #ff6b35;
  --ready:    #22c55e;
  --radius:   12px;
  --font-display: 'Syne', sans-serif;
  --font-body:    'DM Sans', sans-serif;
  --provider-color: #d97706;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.6;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.4;
}

/* â”€â”€ Header â”€â”€ */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(10,10,15,0.9);
  backdrop-filter: blur(16px);
  flex-shrink: 0;
}
.logo {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: var(--text);
}
.logo-flame {
  width: 24px;
  height: 24px;
  background: linear-gradient(135deg, var(--accent), #ff9a56);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
}
.nav-tabs {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 4px;
}
.nav-tab {
  padding: 6px 14px;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  text-decoration: none;
  transition: all 0.15s;
  border: none;
  background: transparent;
  cursor: pointer;
  font-family: var(--font-body);
}
.nav-tab:hover { color: var(--text); }
.nav-tab.active { background: var(--border-hi); color: var(--text); }

.header-right { display: flex; align-items: center; gap: 12px; }
.btn {
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  border: none;
  cursor: pointer;
  border-radius: 8px;
  padding: 7px 16px;
  transition: all 0.15s;
}
.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
}
.btn-ghost:hover { color: var(--text); border-color: var(--border-hi); }

/* â”€â”€ Provider Rail â”€â”€ */
.provider-rail {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  overflow-x: auto;
}
.provider-rail::-webkit-scrollbar { display: none; }

.rail-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
  margin-right: 4px;
}

.provider-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: transparent;
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  white-space: nowrap;
  transition: all 0.15s;
}
.provider-pill:hover:not(.coming-soon) { border-color: var(--border-hi); color: var(--text); }
.provider-pill.active {
  border-color: var(--provider-color);
  color: var(--provider-color);
  background: rgba(var(--provider-rgb), 0.08);
}
.provider-pill.coming-soon { opacity: 0.38; cursor: default; }
.provider-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

/* â”€â”€ Chat Area â”€â”€ */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.chat-area::-webkit-scrollbar { width: 5px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 999px; }

/* â”€â”€ Messages â”€â”€ */
.message {
  display: flex;
  gap: 12px;
  animation: msgIn 0.2s ease;
  max-width: 820px;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.message.user { flex-direction: row-reverse; align-self: flex-end; }
.message.assistant { align-self: flex-start; }

.msg-avatar {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 2px;
}
.msg-avatar.user-avatar {
  background: var(--border-hi);
  color: var(--muted);
}
.msg-avatar.ai-avatar {
  background: rgba(var(--provider-rgb), 0.15);
  border: 1px solid rgba(var(--provider-rgb), 0.3);
  color: var(--provider-color);
  font-size: 11px;
  font-weight: 700;
  font-family: var(--font-display);
}

.msg-content { max-width: 680px; }

.msg-bubble {
  padding: 12px 16px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.7;
}
.message.user .msg-bubble {
  background: var(--border-hi);
  color: var(--text);
  border-bottom-right-radius: 4px;
}
.message.assistant .msg-bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-bottom-left-radius: 4px;
}

.msg-meta {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
  padding: 0 4px;
}
.message.user .msg-meta { text-align: right; }

/* Markdown in assistant bubble */
.msg-bubble h1, .msg-bubble h2, .msg-bubble h3 {
  font-family: var(--font-display); font-weight: 700;
  margin: 0.8em 0 0.3em; color: var(--text);
}
.msg-bubble h1 { font-size: 1.2em; }
.msg-bubble h2 { font-size: 1.1em; }
.msg-bubble h3 { font-size: 1em; }
.msg-bubble p  { margin-bottom: 0.7em; }
.msg-bubble p:last-child { margin-bottom: 0; }
.msg-bubble ul, .msg-bubble ol { padding-left: 1.4em; margin-bottom: 0.7em; }
.msg-bubble li { margin-bottom: 0.25em; }
.msg-bubble code {
  background: rgba(255,255,255,0.06);
  padding: 1px 5px;
  border-radius: 4px;
  font-family: 'SF Mono', monospace;
  font-size: 0.88em;
}
.msg-bubble pre {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  overflow-x: auto;
  margin: 0.7em 0;
}
.msg-bubble pre code { background: none; padding: 0; }
.msg-bubble strong { font-weight: 600; }

/* Typing indicator */
.typing-indicator {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 14px 16px;
}
.typing-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--muted);
  animation: typingBounce 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* Empty state */
.empty-chat {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
  gap: 12px;
}
.empty-provider-icon {
  width: 64px;
  height: 64px;
  border-radius: 18px;
  background: rgba(var(--provider-rgb), 0.12);
  border: 1px solid rgba(var(--provider-rgb), 0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 800;
  color: var(--provider-color);
  margin-bottom: 4px;
}
.empty-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
}
.empty-sub { color: var(--muted); font-size: 14px; max-width: 320px; }
.starter-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-top: 8px;
  max-width: 460px;
}
.starter-chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 7px 14px;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.starter-chip:hover { color: var(--text); border-color: var(--border-hi); }

/* â”€â”€ Input Bar â”€â”€ */
.input-bar {
  padding: 16px 24px 20px;
  border-top: 1px solid var(--border);
  background: rgba(10,10,15,0.9);
  backdrop-filter: blur(16px);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.input-bar-inner {
  width: 100%;
  max-width: 720px;
}
.input-row {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
  transition: border-color 0.2s;
}
.input-row:focus-within { border-color: var(--border-hi); }
.chat-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--text);
  resize: none;
  max-height: 160px;
  line-height: 1.5;
}
.chat-input::placeholder { color: var(--muted); }
.send-btn {
  width: 36px;
  height: 36px;
  border-radius: 9px;
  background: var(--accent);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
  font-size: 16px;
}
.send-btn:hover { background: #ff7f4f; }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.input-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
  padding: 0 2px;
}
.input-hint { font-size: 11px; color: var(--muted); }
.compare-link {
  font-size: 12px;
  color: var(--muted);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: color 0.15s;
}
.compare-link:hover { color: var(--accent); }

/* â”€â”€ Action buttons on messages â”€â”€ */
.msg-actions {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  opacity: 0;
  transition: opacity 0.15s;
}
.message:hover .msg-actions { opacity: 1; }
.msg-action-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 3px 8px;
  font-size: 11px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.1s;
  font-family: var(--font-body);
}
.msg-action-btn:hover { color: var(--text); border-color: var(--border-hi); }
</style>
</head>
<body>
<div id="root"></div>
<script src="/js/forge-api.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useRef, useCallback } = React;

const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:3001'
  : 'https://projectcoachai-backend.up.railway.app';

const PROVIDERS = [
  { id: 'claude',     name: 'Claude',     color: '#d97706', rgb: '217,119,6',   abbr: 'CL', ready: true, url: 'https://claude.ai/new'           },
  { id: 'chatgpt',    name: 'ChatGPT',    color: '#10b981', rgb: '16,185,129',  abbr: 'GP', ready: true, url: 'https://chatgpt.com'             },
  { id: 'gemini',     name: 'Gemini',     color: '#3b82f6', rgb: '59,130,246',  abbr: 'GM', ready: true, url: 'https://gemini.google.com'       },
  { id: 'mistral',    name: 'Mistral',    color: '#f59e0b', rgb: '245,158,11',  abbr: 'MS', ready: true, url: 'https://chat.mistral.ai'         },
  { id: 'deepseek',   name: 'DeepSeek',   color: '#6366f1', rgb: '99,102,241',  abbr: 'DS', ready: true, url: 'https://chat.deepseek.com'       },
  { id: 'perplexity', name: 'Perplexity', color: '#14b8a6', rgb: '20,184,166',  abbr: 'PX', ready: true, url: 'https://www.perplexity.ai'       },
  { id: 'grok',       name: 'Grok',       color: '#ec4899', rgb: '236,72,153',  abbr: 'GK', ready: true, url: 'https://grok.com'                },
];

const STARTERS = [
  'Explain quantum entanglement simply',
  'What are the best ways to build a habit?',
  'How does compound interest actually work?',
  'Give me a framework for making hard decisions',
  'What makes a great product manager?',
];

function renderMd(text) {
  if (!text) return '';
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/^\- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*?<\/li>(\n|$))+/gs, s => `<ul>${s}</ul>`)
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[hup]|<\/[hup])(.+)$/gm, m => m.startsWith('<') ? m : `<p>${m}</p>`)
    .replace(/<p><\/p>/g,'');
}

function Message({ msg, provider }) {
  const isUser = msg.role === 'user';
  const p = provider;
  return React.createElement('div', { className: `message ${msg.role}` },
    React.createElement('div', {
      className: `msg-avatar ${isUser ? 'user-avatar' : 'ai-avatar'}`,
      style: isUser ? {} : {
        '--provider-color': p.color,
        '--provider-rgb': p.rgb,
      }
    }, isUser ? 'ðŸ§‘' : p.abbr),
    React.createElement('div', { className: 'msg-content' },
      React.createElement('div', {
        className: 'msg-bubble',
        dangerouslySetInnerHTML: isUser
          ? { __html: `<p>${msg.content.replace(/\n/g,'<br/>')}</p>` }
          : { __html: renderMd(msg.content) }
      }),
      React.createElement('div', { className: 'msg-meta' },
        isUser
          ? new Date(msg.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          : `${p.name} Â· ${new Date(msg.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}${msg.elapsed ? ` Â· ${(msg.elapsed/1000).toFixed(1)}s` : ''}`
      ),
      !isUser && React.createElement('div', { className: 'msg-actions' },
        React.createElement('button', {
          className: 'msg-action-btn',
          onClick: () => navigator.clipboard?.writeText(msg.content)
        }, 'âŽ˜ Copy'),
        React.createElement('button', {
          className: 'msg-action-btn',
          onClick: () => {
            const url = new URL('index.html', window.location.href);
            window.location.href = url.href;
          }
        }, 'â‡„ Compare all AIs')
      )
    )
  );
}

function TypingIndicator({ provider: p }) {
  return React.createElement('div', { className: 'message assistant' },
    React.createElement('div', {
      className: 'msg-avatar ai-avatar',
      style: { '--provider-color': p.color, '--provider-rgb': p.rgb }
    }, p.abbr),
    React.createElement('div', { className: 'msg-bubble' },
      React.createElement('div', { className: 'typing-indicator' },
        React.createElement('div', { className: 'typing-dot' }),
        React.createElement('div', { className: 'typing-dot' }),
        React.createElement('div', { className: 'typing-dot' })
      )
    )
  );
}

function App() {
  useEffect(function() {
    if (typeof Forge !== 'undefined') {
      Forge.restoreSession().then(function() {
        if (!Forge.isAuthenticated()) Forge.requireAuth('/quick-chat.html');
      });
    }
  }, []);

  var initProvider = new URLSearchParams(window.location.search).get('provider') || 'claude';
  var activeState = useState(initProvider);
  var active = activeState[0];

  function launch(id) {
    var p = PROVIDERS.find(function(x) { return x.id === id; });
    if (!p) return;
    if (typeof chrome !== 'undefined' && chrome.runtime && chrome.runtime.sendMessage) {
      var EXT_IDS = ['niodlddcipfajmpinpemgbchpbojiepi','jjfinkdpgicfhcmackebkpbchpgpcjan'];
      var activeId = EXT_IDS[0];
      (function tryNext(i) {
        if (i >= EXT_IDS.length) return;
        chrome.runtime.sendMessage(EXT_IDS[i], { type: 'PING' }, function(r) {
          if (!chrome.runtime.lastError && r && r.ok) activeId = EXT_IDS[i];
        });
      })(0);
      chrome.runtime.sendMessage(
        activeId,
        { type: 'OPEN_PROVIDER', provider: id, prompt: '' }
      );
    } else {
      window.location.href = p.url;
    }
  }

  return React.createElement('div', { style: { display:'flex', flexDirection:'column', height:'100vh' } },

    React.createElement('header', { className: 'header' },
      React.createElement('a', { href: 'index.html', className: 'logo' },
        React.createElement('div', { className: 'logo-flame' }, '\uD83D\uDD25'),
        'Forge'
      ),
      React.createElement('nav', { className: 'nav-tabs' },
        React.createElement('a',      { href: 'index.html',           className: 'nav-tab' }, 'Perspectives'),
        React.createElement('button', {                                className: 'nav-tab active' }, '\u26A1 Quick Answer'),
        React.createElement('a',      { href: 'synthesis.html',       className: 'nav-tab' }, 'Synthesis'),
        React.createElement('a',      { href: 'forge.html',           className: 'nav-tab' }, '\u2726\u2726 Forge'),
        React.createElement('a',      { href: 'forge-synthesis.html', className: 'nav-tab' }, 'Bring Your Own')
      ),
      React.createElement('div', { className: 'header-right' },
        (function() {
          var user = typeof Forge !== 'undefined' ? Forge.getUser() : null;
          if (user) return React.createElement('div', {
            className: 'user-pill',
            onClick: function() { location.href = '/profile.html'; },
            style: { display:'flex',alignItems:'center',gap:'8px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'999px',padding:'5px 12px 5px 6px',fontSize:'13px',cursor:'pointer' }
          },
            React.createElement('div', { style:{width:'24px',height:'24px',borderRadius:'50%',background:'linear-gradient(135deg,var(--accent),#ff9a56)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:'700',color:'#fff'} },
              (user.name||'U')[0].toUpperCase()
            ),
            (user.name||'Account').split(' ')[0]
          );
          return React.createElement('a', { href: '/signin.html', className: 'btn btn-ghost' }, 'Sign In');
        })()
      )
    ),

    React.createElement('div', {
      style: {
        flex: 1, display: 'grid',
        gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))',
        gap: '16px', padding: '48px', alignContent: 'center',
      }
    },
      PROVIDERS.map(function(p) {
        var isActive = active === p.id;
        return React.createElement('button', {
          key: p.id,
          onClick: function() { launch(p.id); },
          style: {
            background: isActive ? 'rgba('+p.rgb+',0.1)' : 'var(--surface)',
            border: '1px solid ' + (isActive ? p.color : 'var(--border)'),
            borderRadius: '16px', padding: '32px 20px', cursor: 'pointer',
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '14px',
            transition: 'all 0.15s', color: 'var(--text)', fontFamily: 'var(--font-body)',
          },
          onMouseEnter: function(e) {
            e.currentTarget.style.border = '1px solid ' + p.color;
            e.currentTarget.style.background = 'rgba('+p.rgb+',0.1)';
            e.currentTarget.style.transform = 'translateY(-2px)';
          },
          onMouseLeave: function(e) {
            e.currentTarget.style.border = '1px solid ' + (isActive ? p.color : 'var(--border)');
            e.currentTarget.style.background = isActive ? 'rgba('+p.rgb+',0.1)' : 'var(--surface)';
            e.currentTarget.style.transform = '';
          },
        },
          React.createElement('div', {
            style: { width:'52px', height:'52px', borderRadius:'14px',
              background:'rgba('+p.rgb+',0.15)', border:'1px solid rgba('+p.rgb+',0.3)',
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:'14px', fontWeight:'800', color:p.color, fontFamily:'var(--font-display)',
            }
          }, p.abbr),
          React.createElement('div', { style:{ fontSize:'15px', fontWeight:'600' } }, p.name),
          React.createElement('div', { style:{ fontSize:'11px', color:'var(--muted)' } }, 'Your subscription')
        );
      })
    ),

    React.createElement('div', {
      style: { textAlign:'center', padding:'14px 24px', fontSize:'12px', color:'var(--muted)', borderTop:'1px solid var(--border)' }
    },
      'Opens in this tab with the Forge bar on top\u2002\u00B7\u2002',
      React.createElement('a', { href:'index.html', style:{ color:'var(--accent)', textDecoration:'none' } },
        '\u21C4 Compare across all AIs \u2192'
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>

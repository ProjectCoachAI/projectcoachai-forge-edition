<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forge - Quick Answer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/forge.css"/>
<style>
:root {
  --bg:#0a0a0f;--surface:#111118;--border:#1e1e2e;--border-hi:#2a2a3e;
  --text:#e8e8f0;--muted:#6b6b88;--accent:#ff6b35;--ready:#22c55e;--radius:12px;
  --font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
  --provider-color:#d97706;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.6;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.provider-pill{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;border:1px solid var(--border);background:transparent;cursor:pointer;font-family:var(--font-body);font-size:13px;font-weight:500;color:var(--muted);white-space:nowrap;transition:all 0.15s;}
.provider-pill:hover{border-color:var(--border-hi);color:var(--text);}
.provider-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}
.msg-avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px;}
.msg-avatar.user-avatar{background:var(--border-hi);color:var(--muted);}
.msg-avatar.ai-avatar{background:rgba(var(--provider-rgb),0.15);border:1px solid rgba(var(--provider-rgb),0.3);color:var(--provider-color);font-size:11px;font-weight:700;font-family:var(--font-display);}
.typing-indicator{display:flex;align-items:center;gap:4px;padding:14px 16px;}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:typingBounce 1.2s infinite;}
.typing-dot:nth-child(2){animation-delay:0.2s;}
.typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:0.4;}30%{transform:translateY(-6px);opacity:1;}}
.msg-bubble h1,.msg-bubble h2,.msg-bubble h3{font-family:var(--font-display);font-weight:700;margin:0.8em 0 0.3em;color:var(--text);}
.msg-bubble h1{font-size:1.2em;}.msg-bubble h2{font-size:1.1em;}.msg-bubble h3{font-size:1em;}
.msg-bubble p{margin-bottom:0.7em;}.msg-bubble p:last-child{margin-bottom:0;}
.msg-bubble ul,.msg-bubble ol{padding-left:1.4em;margin-bottom:0.7em;}
.msg-bubble li{margin-bottom:0.25em;}
.msg-bubble code{background:rgba(255,255,255,0.06);padding:1px 5px;border-radius:4px;font-family:'SF Mono',monospace;font-size:0.88em;}
.msg-bubble pre{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:12px;overflow-x:auto;margin:0.7em 0;}
.msg-bubble pre code{background:none;padding:0;}
.msg-bubble strong{font-weight:600;}
.msg-actions{display:flex;gap:6px;margin-top:6px;opacity:0;transition:opacity 0.15s;}
.message:hover .msg-actions{opacity:1;}
.msg-action-btn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--muted);cursor:pointer;transition:all 0.1s;font-family:var(--font-body);}
.msg-action-btn:hover{color:var(--text);border-color:var(--border-hi);}
</style>
</head>
<body>
<div id="root"></div>
<script src="/js/forge-api.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useRef, useCallback } = React;

const PROVIDERS = [
  { id:'claude',     name:'Claude',     color:'#d97706', rgb:'217,119,6',   abbr:'CL', url:'https://claude.ai/new'         },
  { id:'chatgpt',    name:'ChatGPT',    color:'#10b981', rgb:'16,185,129',  abbr:'GP', url:'https://chatgpt.com'           },
  { id:'gemini',     name:'Gemini',     color:'#3b82f6', rgb:'59,130,246',  abbr:'GM', url:'https://gemini.google.com'     },
  { id:'mistral',    name:'Mistral',    color:'#f59e0b', rgb:'245,158,11',  abbr:'MS', url:'https://chat.mistral.ai'       },
  { id:'deepseek',   name:'DeepSeek',   color:'#6366f1', rgb:'99,102,241',  abbr:'DS', url:'https://chat.deepseek.com'     },
  { id:'perplexity', name:'Perplexity', color:'#14b8a6', rgb:'20,184,166',  abbr:'PX', url:'https://www.perplexity.ai'     },
  { id:'grok',       name:'Grok',       color:'#ec4899', rgb:'236,72,153',  abbr:'GK', url:'https://grok.com'             },
];

function renderMd(text) {
  if (!text) return '';
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^\- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*?<\/li>(\n|$))+/gs, s => '<ul>'+s+'</ul>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/^(?!<[hup]|<\/[hup])(.+)$/gm, m => m.startsWith('<') ? m : '<p>'+m+'</p>')
    .replace(/<p><\/p>/g,'');
}

function Message({ msg, provider: p }) {
  const isUser = msg.role === 'user';
  return React.createElement('div', { className: 'message ' + msg.role },
    React.createElement('div', {
      className: 'msg-avatar ' + (isUser ? 'user-avatar' : 'ai-avatar'),
      style: isUser ? {} : { '--provider-color': p.color, '--provider-rgb': p.rgb }
    }, isUser ? 'You' : p.abbr),
    React.createElement('div', { className: 'msg-content' },
      React.createElement('div', {
        className: 'msg-bubble',
        dangerouslySetInnerHTML: isUser
          ? { __html: '<p>' + msg.content.replace(/\n/g,'<br/>') + '</p>' }
          : { __html: renderMd(msg.content) }
      }),
      React.createElement('div', { className: 'msg-meta' },
        isUser
          ? new Date(msg.ts).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' })
          : p.name + ' \u00B7 ' + new Date(msg.ts).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) + (msg.elapsed ? ' \u00B7 ' + (msg.elapsed/1000).toFixed(1) + 's' : '')
      ),
      !isUser && React.createElement('div', { className: 'msg-actions' },
        React.createElement('button', {
          className: 'msg-action-btn',
          onClick: () => navigator.clipboard && navigator.clipboard.writeText(msg.content)
        }, '\u2318 Copy'),
        React.createElement('button', {
          className: 'msg-action-btn',
          onClick: () => { window.location.href = '/index.html'; }
        }, '\u21C4 Compare all AIs')
      )
    )
  );
}

function TypingIndicator({ provider: p }) {
  return React.createElement('div', { className: 'message assistant' },
    React.createElement('div', {
      className: 'msg-avatar ai-avatar',
      style: { '--provider-color': p.color, '--provider-rgb': p.rgb }
    }, p.abbr),
    React.createElement('div', { className: 'msg-bubble' },
      React.createElement('div', { className: 'typing-indicator' },
        React.createElement('div', { className: 'typing-dot' }),
        React.createElement('div', { className: 'typing-dot' }),
        React.createElement('div', { className: 'typing-dot' })
      )
    )
  );
}

function App() {
  useEffect(function() {
    if (typeof Forge !== 'undefined') {
      Forge.restoreSession().then(function() {
        if (!Forge.isAuthenticated()) Forge.requireAuth('/quick-chat.html');
      });
    }
  }, []);

  var initProvider = new URLSearchParams(window.location.search).get('provider') || 'claude';
  var active = useState(initProvider)[0];

  function launch(id) {
    var p = PROVIDERS.find(function(x) { return x.id === id; });
    if (!p) return;
    if (typeof chrome !== 'undefined' && chrome.runtime && chrome.runtime.sendMessage) {
      var EXT_IDS = ['niodlddcipfajmpinpemgbchpbojiepi','jjfinkdpgicfhcmackebkpbchpgpcjan'];
      chrome.runtime.sendMessage(EXT_IDS[0], { type: 'OPEN_PROVIDER', provider: id, prompt: '' });
    } else {
      window.location.href = p.url;
    }
  }

  return React.createElement('div', { style: { display:'flex', flexDirection:'column', height:'100vh' } },

    React.createElement('header', { className: 'header' },
      React.createElement('a', { href: '/index.html', className: 'logo' },
        React.createElement('div', { className: 'logo-flame' }, '\uD83D\uDD25'),
        'Forge'
      ),
      React.createElement('nav', { className: 'nav-tabs' },
        React.createElement('a',      { href:'/index.html',     className:'nav-tab' }, 'Perspectives'),
        React.createElement('button', {                          className:'nav-tab active' }, '\u26A1 Quick Answer'),
        React.createElement('a',      { href:'/synthesis.html', className:'nav-tab' }, 'Synthesis'),
        React.createElement('a',      { href:'/forge.html',     className:'nav-tab' }, '\u2726\u2726 Forge'),
        React.createElement('a',      { href:'/excel.html',     className:'nav-tab' }, '\uD83D\uDCCA Excel')
      ),
      React.createElement('div', { className: 'header-right', id: 'headerAuth' })
    ),

    React.createElement('div', {
      style: {
        flex:1, display:'grid',
        gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',
        gap:'16px', padding:'48px', alignContent:'center',
      }
    },
      PROVIDERS.map(function(p) {
        var isActive = active === p.id;
        return React.createElement('button', {
          key: p.id,
          onClick: function() { launch(p.id); },
          style: {
            background: isActive ? 'rgba('+p.rgb+',0.1)' : 'var(--surface)',
            border: '1px solid ' + (isActive ? p.color : 'var(--border)'),
            borderRadius:'16px', padding:'32px 20px', cursor:'pointer',
            display:'flex', flexDirection:'column', alignItems:'center', gap:'14px',
            transition:'all 0.15s', color:'var(--text)', fontFamily:'var(--font-body)',
          },
          onMouseEnter: function(e) {
            e.currentTarget.style.border = '1px solid ' + p.color;
            e.currentTarget.style.background = 'rgba('+p.rgb+',0.1)';
            e.currentTarget.style.transform = 'translateY(-2px)';
          },
          onMouseLeave: function(e) {
            e.currentTarget.style.border = '1px solid ' + (isActive ? p.color : 'var(--border)');
            e.currentTarget.style.background = isActive ? 'rgba('+p.rgb+',0.1)' : 'var(--surface)';
            e.currentTarget.style.transform = '';
          },
        },
          React.createElement('div', {
            style: { width:'52px', height:'52px', borderRadius:'14px',
              background:'rgba('+p.rgb+',0.15)', border:'1px solid rgba('+p.rgb+',0.3)',
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:'14px', fontWeight:'800', color:p.color, fontFamily:'var(--font-display)',
            }
          }, p.abbr),
          React.createElement('div', { style:{ fontSize:'15px', fontWeight:'600' } }, p.name),
          React.createElement('div', { style:{ fontSize:'11px', color:'var(--muted)' } }, 'Your subscription')
        );
      })
    ),

    React.createElement('div', {
      style: { textAlign:'center', padding:'14px 24px', fontSize:'12px', color:'var(--muted)', borderTop:'1px solid var(--border)' }
    },
      'Opens in this tab with the Forge bar on top \u00B7 ',
      React.createElement('a', { href:'/index.html', style:{ color:'var(--accent)', textDecoration:'none' } },
        '\u21C4 Compare across all AIs \u2192'
      )
    )
  );
}

// Auth header
(async function() {
  try {
    let user = typeof Forge !== 'undefined' && Forge.getUser ? Forge.getUser() : null;
    if (!user && typeof Forge !== 'undefined' && Forge.restoreSession) user = await Forge.restoreSession().catch(()=>null);
    const el = document.getElementById('headerAuth');
    if (!el) return;
    if (user) {
      const firstName = (user.name||'Account').split(' ')[0];
      const initial = (user.name||'U')[0].toUpperCase();
      el.innerHTML = '<a href="/profile.html" style="display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text);font-size:13px"><div class="user-avatar">'+initial+'</div>'+firstName+'</a>';
    } else {
      el.innerHTML = '<a href="/signin.html" class="btn btn-ghost" style="font-size:13px">Sign In</a>';
    }
  } catch(_){}
})();

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
<footer class="forge-footer">
  <div class="footer-tagline">The decision layer on top of AI.<br>Local-first. Your accounts. Your data.</div>
  <div class="footer-links">
    <a href="/pricing.html">Pricing</a><span class="sep">&middot;</span>
    <a href="/why-forge.html">Why Forge</a><span class="sep">&middot;</span>
    <a href="/why-excel.html">Why Excel</a><span class="sep">&middot;</span>
    <a href="/help.html">Help</a><span class="sep">&middot;</span>
    <a href="/contact.html">Contact</a><span class="sep">&middot;</span>
    <a href="/profile.html">Profile</a><span class="sep">&middot;</span>
    <a href="/privacy.html">Privacy</a><span class="sep">&middot;</span>
    <a href="/terms.html">Terms</a>
  </div>
</footer>
</body>
</html>

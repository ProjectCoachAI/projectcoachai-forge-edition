<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forge Perspective</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'DM Sans', sans-serif;
    background: #09090f;
    color: #e8e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .sp-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 14px;
    border-bottom: 1px solid #1a1a2e;
    flex-shrink: 0;
  }
  .sp-logo {
    width: 22px; height: 22px;
    background: linear-gradient(135deg, #ff6b35, #ff9a56);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; color: #fff;
  }
  .sp-title { font-size: 13px; font-weight: 700; color: #e8e8f0; flex: 1; }
  .sp-mode { font-size: 11px; color: #f97316; font-weight: 600; }

  /* Provider chips */
  .sp-providers {
    display: flex;
    gap: 6px;
    padding: 12px 14px;
    flex-wrap: wrap;
    border-bottom: 1px solid #1a1a2e;
    flex-shrink: 0;
    background: #0d0d16;
  }
  .sp-providers-label {
    width: 100%;
    font-size: 10px;
    font-weight: 700;
    color: #3a3a5c;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .sp-chip {
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid #2a2a3e;
    background: #111118;
    color: #8888aa;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    display: flex; align-items: center; gap: 6px;
  }
  .sp-chip:hover { border-color: #f97316; color: #e8e8f0; background: #16161f; }
  .sp-chip.active { border-color: var(--c); color: var(--c); background: rgba(255,255,255,.06); }
  .sp-chip-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* Response area */
  .sp-response {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    line-height: 1.65;
    font-size: 13px;
    color: #c8c8e0;
  }
  .sp-response::-webkit-scrollbar { width: 4px; }
  .sp-response::-webkit-scrollbar-track { background: transparent; }
  .sp-response::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 2px; }

  .sp-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
    color: #3a3a5c;
    text-align: center;
    padding: 20px;
  }
  .sp-empty-icon { font-size: 28px; opacity: .4; }
  .sp-empty-text { font-size: 13px; line-height: 1.5; }

  .sp-provider-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid #1a1a2e;
  }
  .sp-provider-dot { width: 7px; height: 7px; border-radius: 50%; }
  .sp-response-text { white-space: pre-wrap; word-break: break-word; }

  /* Input area */
  .sp-input-area {
    padding: 10px 14px;
    border-top: 1px solid #1a1a2e;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }
  .sp-input {
    width: 100%;
    background: #111118;
    border: 1px solid #2a2a3e;
    border-radius: 8px;
    color: #e8e8f0;
    font-family: inherit;
    font-size: 12px;
    padding: 8px 10px;
    resize: none;
    outline: none;
    transition: border-color .15s;
    line-height: 1.5;
  }
  .sp-input:focus { border-color: #f97316; }
  .sp-input::placeholder { color: #3a3a5c; }
  .sp-send {
    background: linear-gradient(135deg, #ff6b35, #ff9a56);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 7px 14px;
    cursor: pointer;
    width: 100%;
    transition: opacity .15s;
  }
  .sp-send:hover { opacity: .9; }
  .sp-send:disabled { opacity: .4; cursor: not-allowed; }

  .sp-status {
    font-size: 10px;
    color: #3a3a5c;
    text-align: center;
  }

  /* Trust strip */
  .sp-trust {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 0 2px;
    font-size: 10px;
    color: #3a3a5c;
    flex-wrap: wrap;
  }
  .sp-trust-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .sp-trust-sep { color: #1e1e30; }

  /* History — accumulated Q&A pairs */
  .sp-history-item {
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid #1a1a2e;
  }
  .sp-history-item:last-child { border-bottom: none; margin-bottom: 0; }
  .sp-question {
    font-size: 12px;
    font-weight: 700;
    color: #e8e8f0;
    margin-bottom: 10px;
    padding: 8px 10px;
    background: #1a1a2e;
    border-radius: 6px;
    border-left: 3px solid var(--q-color, #f97316);
  }
</style>
</head>
<body>

<div class="sp-header">
  <div class="sp-logo">F</div>
  <span class="sp-title">Forge Perspective</span>
  <span class="sp-mode">◎ Perspective</span>
</div>

<div class="sp-providers" id="spProviders">
  <div class="sp-providers-label">Get a perspective from</div>
</div>

<div class="sp-response" id="spResponse">
  <div class="sp-empty">
    <div class="sp-empty-icon">◎</div>
    <div class="sp-empty-text">Select an AI above and ask your question to get a fresh perspective alongside your current conversation.</div>
  </div>
</div>

<div class="sp-input-area">
  <textarea class="sp-input" id="spInput" rows="2" placeholder="Ask for a perspective..."></textarea>
  <button class="sp-send" id="spSend">Get Perspective →</button>
  <div class="sp-status" id="spStatus">Select a provider above to begin</div>
</div>

<script src="forge-sidepanel.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forge Split</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'DM Sans', sans-serif;
    background: #09090f;
    color: #e8e8f0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .sp-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 14px;
    border-bottom: 1px solid #1a1a2e;
    flex-shrink: 0;
  }
  .sp-logo {
    width: 22px; height: 22px;
    background: linear-gradient(135deg, #ff6b35, #ff9a56);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; color: #fff;
  }
  .sp-title { font-size: 13px; font-weight: 700; color: #e8e8f0; flex: 1; }
  .sp-mode { font-size: 11px; color: #f97316; font-weight: 600; }

  /* Provider chips */
  .sp-providers {
    display: flex;
    gap: 6px;
    padding: 10px 14px;
    flex-wrap: wrap;
    border-bottom: 1px solid #1a1a2e;
    flex-shrink: 0;
  }
  .sp-chip {
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid #2a2a3e;
    background: #111118;
    color: #6b6b88;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    display: flex; align-items: center; gap: 5px;
  }
  .sp-chip:hover { border-color: #f97316; color: #e8e8f0; }
  .sp-chip.active { border-color: var(--c); color: var(--c); background: rgba(255,255,255,.04); }
  .sp-chip-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* Response area */
  .sp-response {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    line-height: 1.65;
    font-size: 13px;
    color: #c8c8e0;
  }
  .sp-response::-webkit-scrollbar { width: 4px; }
  .sp-response::-webkit-scrollbar-track { background: transparent; }
  .sp-response::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 2px; }

  .sp-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 10px;
    color: #3a3a5c;
    text-align: center;
    padding: 20px;
  }
  .sp-empty-icon { font-size: 28px; opacity: .4; }
  .sp-empty-text { font-size: 13px; line-height: 1.5; }

  .sp-provider-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid #1a1a2e;
  }
  .sp-provider-dot { width: 7px; height: 7px; border-radius: 50%; }
  .sp-response-text { white-space: pre-wrap; word-break: break-word; }

  /* Input area */
  .sp-input-area {
    padding: 10px 14px;
    border-top: 1px solid #1a1a2e;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }
  .sp-input {
    width: 100%;
    background: #111118;
    border: 1px solid #2a2a3e;
    border-radius: 8px;
    color: #e8e8f0;
    font-family: inherit;
    font-size: 12px;
    padding: 8px 10px;
    resize: none;
    outline: none;
    transition: border-color .15s;
    line-height: 1.5;
  }
  .sp-input:focus { border-color: #f97316; }
  .sp-input::placeholder { color: #3a3a5c; }
  .sp-send {
    background: linear-gradient(135deg, #ff6b35, #ff9a56);
    border: none;
    border-radius: 6px;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 7px 14px;
    cursor: pointer;
    width: 100%;
    transition: opacity .15s;
  }
  .sp-send:hover { opacity: .9; }
  .sp-send:disabled { opacity: .4; cursor: not-allowed; }

  .sp-status {
    font-size: 10px;
    color: #3a3a5c;
    text-align: center;
  }
</style>
</head>
<body>

<div class="sp-header">
  <div class="sp-logo">F</div>
  <span class="sp-title">Forge Split</span>
  <span class="sp-mode">⊟ Split Mode</span>
</div>

<div class="sp-providers" id="spProviders"></div>

<div class="sp-response" id="spResponse">
  <div class="sp-empty">
    <div class="sp-empty-icon">⊟</div>
    <div class="sp-empty-text">Select a second AI above, then ask a question or switch to that AI's tab to see its response here.</div>
  </div>
</div>

<div class="sp-input-area">
  <textarea class="sp-input" id="spInput" rows="2" placeholder="Ask the selected AI..."></textarea>
  <button class="sp-send" id="spSend">Ask →</button>
  <div class="sp-status" id="spStatus">Select a provider above to begin</div>
</div>

<script>
const PROVIDERS = [
  { id: 'claude',     label: 'Claude',     color: '#d97706', url: 'https://claude.ai/new' },
  { id: 'chatgpt',   label: 'ChatGPT',    color: '#10a37f', url: 'https://chatgpt.com' },
  { id: 'gemini',    label: 'Gemini',     color: '#4285f4', url: 'https://gemini.google.com' },
  { id: 'mistral',   label: 'Mistral',    color: '#f59e0b', url: 'https://chat.mistral.ai' },
  { id: 'deepseek',  label: 'DeepSeek',   color: '#6366f1', url: 'https://chat.deepseek.com' },
  { id: 'perplexity',label: 'Perplexity', color: '#22c55e', url: 'https://www.perplexity.ai' },
  { id: 'grok',      label: 'Grok',       color: '#ec4899', url: 'https://grok.com' }
];

let selectedProvider = null;
let lastResponse = {};

// Render provider chips
const chipsEl = document.getElementById('spProviders');
PROVIDERS.forEach(p => {
  const chip = document.createElement('button');
  chip.className = 'sp-chip';
  chip.style.setProperty('--c', p.color);
  chip.dataset.id = p.id;
  chip.innerHTML = `<span class="sp-chip-dot" style="background:${p.color}"></span>${p.label}`;
  chip.addEventListener('click', () => selectProvider(p));
  chipsEl.appendChild(chip);
});

function selectProvider(p) {
  selectedProvider = p;
  document.querySelectorAll('.sp-chip').forEach(c => c.classList.remove('active'));
  const chip = document.querySelector(`.sp-chip[data-id="${p.id}"]`);
  if (chip) chip.classList.add('active');
  document.getElementById('spStatus').textContent = `Connected to ${p.label}`;

  // Show last captured response for this provider if available
  if (lastResponse[p.id]) {
    showResponse(p, lastResponse[p.id]);
  } else {
    document.getElementById('spResponse').innerHTML = `
      <div class="sp-empty">
        <div class="sp-empty-icon" style="color:${p.color}">●</div>
        <div class="sp-empty-text">Ask ${p.label} a question below, or switch to its tab to capture a response automatically.</div>
      </div>`;
  }
}

function showResponse(p, text) {
  document.getElementById('spResponse').innerHTML = `
    <div class="sp-provider-label">
      <span class="sp-provider-dot" style="background:${p.color}"></span>
      <span style="color:${p.color}">${p.label}</span>
    </div>
    <div class="sp-response-text">${escapeHtml(text)}</div>`;
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Listen for captured responses from background
chrome.runtime.onMessage.addListener((msg) => {
  if (msg.type === 'FORGE_TO_PAGE' && msg.data?.type === 'RESPONSE_CAPTURED') {
    const { provider, response } = msg.data;
    lastResponse[provider] = response;
    if (selectedProvider?.id === provider) {
      showResponse(selectedProvider, response);
      document.getElementById('spStatus').textContent = `${selectedProvider.label} responded · just now`;
    }
  }
});

// Also listen for window messages (from forge-isolated relay)
window.addEventListener('message', (event) => {
  if (event.data?.type === 'RESPONSE_CAPTURED' && event.data.provider && event.data.response) {
    const provider = event.data.provider;
    lastResponse[provider] = event.data.response;
    if (selectedProvider?.id === provider) {
      showResponse(selectedProvider, event.data.response);
    }
  }
});

// Send button
document.getElementById('spSend').addEventListener('click', sendPrompt);
document.getElementById('spInput').addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') sendPrompt();
});

function sendPrompt() {
  if (!selectedProvider) {
    document.getElementById('spStatus').textContent = 'Select a provider first';
    return;
  }
  const prompt = document.getElementById('spInput').value.trim();
  if (!prompt) return;

  document.getElementById('spSend').disabled = true;
  document.getElementById('spStatus').textContent = `Sending to ${selectedProvider.label}...`;
  document.getElementById('spResponse').innerHTML = `
    <div class="sp-empty">
      <div class="sp-empty-icon" style="color:${selectedProvider.color}">⟳</div>
      <div class="sp-empty-text">Waiting for ${selectedProvider.label}...</div>
    </div>`;

  // Dispatch prompt to selected provider via background
  chrome.runtime.sendMessage({
    type: 'SEND_PROMPT',
    prompt,
    providers: [selectedProvider.id]
  }, () => {
    document.getElementById('spSend').disabled = false;
    document.getElementById('spStatus').textContent = `Prompt sent to ${selectedProvider.label} · waiting for response...`;
  });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forge Perspectives</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── 8 Color Themes ── */
  :root {
    --sp-bg: #09090f;
    --sp-surface: #111118;
    --sp-border: #1a1a2e;
    --sp-text: #e8e8f0;
    --sp-muted: #6b6b88;
    --sp-accent: #ff6b35;
  }
  body[data-theme="dark"]     { --sp-bg:#09090f; --sp-surface:#111118; --sp-border:#1a1a2e; --sp-text:#e8e8f0; --sp-muted:#6b6b88; --sp-accent:#ff6b35; }
  body[data-theme="slate"]    { --sp-bg:#0c0d10; --sp-surface:#141520; --sp-border:#20222e; --sp-text:#d8dae8; --sp-muted:#585a78; --sp-accent:#ff6b35; }
  body[data-theme="forest"]   { --sp-bg:#0a0f0a; --sp-surface:#111811; --sp-border:#1a2e1a; --sp-text:#e0f0e0; --sp-muted:#507050; --sp-accent:#4caf50; }
  body[data-theme="ember"]    { --sp-bg:#0f0a06; --sp-surface:#1a1208; --sp-border:#2e1e0a; --sp-text:#f8ede0; --sp-muted:#806040; --sp-accent:#f59e0b; }
  body[data-theme="light"]    { --sp-bg:#f8f9fc; --sp-surface:#ffffff; --sp-border:#e2e4ee; --sp-text:#111122; --sp-muted:#8888a0; --sp-accent:#ff6b35; }
  body[data-theme="sand"]     { --sp-bg:#faf7f2; --sp-surface:#fff8ee; --sp-border:#e8dcc8; --sp-text:#2a2018; --sp-muted:#9a8878; --sp-accent:#d4640a; }
  body[data-theme="midnight"] { --sp-bg:#0a0a1a; --sp-surface:#10102a; --sp-border:#1e1e3e; --sp-text:#e0e0ff; --sp-muted:#6060a0; --sp-accent:#7c6bff; }
  body[data-theme="plum"]     { --sp-bg:#0f0810; --sp-surface:#180d1a; --sp-border:#2e1a30; --sp-text:#f0e0f8; --sp-muted:#806090; --sp-accent:#c084fc; }

  body {
    background: var(--sp-bg);
    color: var(--sp-text);
    font-family: -apple-system, 'DM Sans', sans-serif;
    background: var(--sp-bg);
    color: var(--sp-text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sp-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--sp-border);
    flex-shrink: 0;
  }
  .sp-logo {
    width: 22px; height: 22px;
    background: linear-gradient(135deg, #ff6b35, #ff9a56);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; color: #fff; flex-shrink: 0;
  }
  .sp-title { font-size: 13px; font-weight: 700; color: var(--sp-text); flex: 1; }
  .sp-clear {
    background: none; border: none; color: var(--sp-muted);
    font-size: 10px; cursor: pointer; padding: 0 4px; font-family: inherit;
    transition: color .15s;
  }
  .sp-clear:hover { color: var(--sp-accent); }
  .sp-mode { font-size: 11px; color: var(--sp-accent); font-weight: 600; }

  .sp-providers {
    display: flex; gap: 6px; padding: 10px 14px;
    flex-wrap: wrap; border-bottom: 1px solid var(--sp-border);
    flex-shrink: 0; background: var(--sp-bg);
  }
  .sp-providers-label {
    width: 100%; font-size: 10px; font-weight: 700;
    color: var(--sp-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;
  }
  .sp-chip {
    padding: 5px 10px; border-radius: 20px; border: 1px solid #2a2a3e;
    background: var(--sp-surface); color: var(--sp-muted); font-size: 11px; font-weight: 600;
    cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 5px;
  }
  .sp-chip:hover { border-color: var(--sp-accent); color: var(--sp-text); background: var(--sp-surface); }
  .sp-chip.active { border-color: var(--c); color: var(--c); background: rgba(255,255,255,.06); }
  .sp-chip-dot { width: 6px; height: 6px; border-radius: 50%; }

  .sp-response {
    flex: 1; overflow-y: auto; padding: 14px; line-height: 1.65;
    font-size: 13px; color: var(--sp-text);
  }
  .sp-response::-webkit-scrollbar { width: 4px; }
  .sp-response::-webkit-scrollbar-track { background: transparent; }
  .sp-response::-webkit-scrollbar-thumb { background: var(--sp-border); border-radius: 2px; }

  .sp-empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; gap: 10px;
    color: var(--sp-muted); text-align: center; padding: 20px;
  }
  .sp-empty-icon { font-size: 28px; opacity: .6; }
  .sp-empty-text { font-size: 13px; line-height: 1.5; color: var(--sp-muted); }

  .sp-history-item { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--sp-border); }
  .sp-history-item:last-child { border-bottom: none; margin-bottom: 0; }
  .sp-question {
    font-size: 12px; font-weight: 700; color: var(--sp-text); margin-bottom: 10px;
    padding: 8px 10px; background: #1a1a2e; border-radius: 6px;
    border-left: 3px solid var(--q-color, #f97316);
  }
  .sp-provider-label {
    display: flex; align-items: center; gap: 6px; font-size: 11px;
    font-weight: 700; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--sp-border);
  }
  .sp-provider-dot { width: 7px; height: 7px; border-radius: 50%; }
  .sp-response-text { white-space: pre-wrap; word-break: break-word; }
  .sp-response-text h3 { color: var(--sp-text); font-weight: 700; margin: 10px 0 4px; font-size: 13px; }
  .sp-response-text strong { color: var(--sp-text); font-weight: 700; }
  .sp-response-text ul, .sp-response-text ol { padding-left: 18px; margin: 4px 0; }
  .sp-response-text li { margin: 2px 0; }
  .sp-response-text p { margin: 6px 0; }
  .sp-trust {
    display: flex; align-items: center; gap: 5px; padding: 6px 0 2px;
    font-size: 10px; color: var(--sp-muted); flex-wrap: wrap;
  }
  .sp-trust-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  .sp-input-area {
    padding: 10px 14px; border-top: 1px solid var(--sp-border);
    display: flex; flex-direction: column; gap: 6px; flex-shrink: 0;
  }

  /* Recent prompts */
  .sp-recent {
    display: none; flex-wrap: wrap; gap: 4px; padding: 2px 0;
  }
  .sp-recent-chip {
    background: var(--sp-surface); border: 1px solid #2a2a3e; border-radius: 12px;
    color: var(--sp-muted); font-size: 10px; padding: 3px 8px; cursor: pointer;
    font-family: inherit; transition: all .15s; max-width: 120px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sp-recent-chip:hover { border-color: var(--sp-accent); color: var(--sp-text); }

  /* Prompt library actions */
  .sp-lib-actions {
    display: flex; gap: 6px; align-items: center;
  }
  .sp-lib-btn {
    background: none; border: 1px solid #2a2a3e; border-radius: 6px;
    color: var(--sp-muted); font-size: 10px; font-weight: 600; padding: 4px 8px;
    cursor: pointer; font-family: inherit; transition: all .15s; white-space: nowrap;
  }
  .sp-lib-btn:hover { border-color: var(--sp-accent); color: var(--sp-accent); }

  .sp-input {
    width: 100%; background: var(--sp-surface); border: 1px solid #2a2a3e; border-radius: 8px;
    color: var(--sp-text); font-family: inherit; font-size: 12px; padding: 8px 10px;
    resize: none; outline: none; transition: border-color .15s; line-height: 1.5;
  }
  .sp-input:focus { border-color: var(--sp-accent); }
  .sp-input::placeholder { color: var(--sp-muted); }

  .sp-send {
    background: linear-gradient(135deg, #ff6b35, #ff9a56); border: none;
    border-radius: 6px; color: #fff; font-size: 12px; font-weight: 700;
    padding: 7px 14px; cursor: pointer; width: 100%; transition: opacity .15s;
  }
  .sp-send:hover { opacity: .9; }
  .sp-send:disabled { opacity: .4; cursor: not-allowed; }
  .sp-status { font-size: 10px; color: var(--sp-muted); text-align: center; }

  /* Library modal */
  .sp-lib-modal {
    display: none; position: absolute; inset: 0;
    background: rgba(0,0,0,.85); z-index: 100;
    flex-direction: column; padding: 16px;
  }
  .sp-lib-modal-inner {
    background: var(--sp-surface); border: 1px solid #2a2a3e; border-radius: 10px;
    flex: 1; display: flex; flex-direction: column; overflow: hidden; max-height: 80vh;
    margin: auto; width: 100%;
  }
  .sp-lib-modal-hdr {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; border-bottom: 1px solid var(--sp-border);
    font-size: 12px; font-weight: 700; color: var(--sp-text);
  }
  .sp-lib-modal-close {
    background: none; border: none; color: var(--sp-muted); font-size: 16px;
    cursor: pointer; line-height: 1;
  }
  .sp-lib-list { overflow-y: auto; padding: 8px; flex: 1; }
  .sp-lib-item {
    padding: 10px 12px; border-radius: 6px; font-size: 12px; color: var(--sp-text);
    cursor: pointer; transition: background .15s; border-bottom: 1px solid var(--sp-border);
    line-height: 1.4;
  }
  .sp-lib-item:hover { background: #1a1a2e; color: var(--sp-text); }
  .sp-lib-item:last-child { border-bottom: none; }
</style>
</head>
<body>

<div class="sp-header">
  <div class="sp-logo">F</div>
  <span class="sp-title">Forge Perspectives</span>
  <button class="sp-clear" id="spClear">✕ Clear</button>
  <span class="sp-mode">◎ Perspective</span>
  <span id="spThemeBtn" title="Change theme" style="cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;color:#6b6b88;user-select:none">🎨</span>
</div>

<div class="sp-providers" id="spProviders">
  <div class="sp-providers-label">Get a perspective from</div>
</div>

<div class="sp-response" id="spResponse">
  <div class="sp-empty">
    <div class="sp-empty-icon">◎</div>
    <div class="sp-empty-text">Select an AI above and ask your question to get a fresh perspective alongside your current conversation.</div>
  </div>
</div>

<div class="sp-input-area">
  <div class="sp-recent" id="spRecent"></div>
  <textarea class="sp-input" id="spInput" rows="2" placeholder="Ask for a perspective..."></textarea>
  <div class="sp-lib-actions">
    <button class="sp-lib-btn" id="spLibLoad">📚 Load from library</button>
    <button class="sp-lib-btn" id="spLibSave">💾 Save to library</button>
  </div>
  <button class="sp-send" id="spSend">Get Perspective →</button>
  <div class="sp-status" id="spStatus">Select a provider above to begin</div>
</div>

<!-- Library modal -->
<div class="sp-lib-modal" id="spLibModal">
  <div class="sp-lib-modal-inner">
    <div class="sp-lib-modal-hdr">
      <span>📚 Prompt Library</span>
      <button class="sp-lib-modal-close" id="spLibClose">✕</button>
    </div>
    <div class="sp-lib-list" id="spLibList"></div>
  </div>
</div>

<script src="forge-sidepanel.js"></script>
<div id="spThemePicker" style="display:none;position:absolute;top:48px;right:8px;z-index:999;background:var(--sp-surface);border:1px solid var(--sp-border);border-radius:10px;padding:10px;flex-wrap:wrap;gap:6px;width:180px">
  <div style="font-size:9px;font-weight:700;color:var(--sp-muted);text-transform:uppercase;letter-spacing:1px;width:100%;margin-bottom:4px">Dark</div>
  <button data-theme="dark"     style="width:28px;height:28px;border-radius:50%;background:#09090f;border:2px solid #ff6b35;cursor:pointer" title="Dark"></button>
  <button data-theme="slate"    style="width:28px;height:28px;border-radius:50%;background:#0c0d10;border:2px solid #94a3b8;cursor:pointer" title="Slate"></button>
  <button data-theme="forest"   style="width:28px;height:28px;border-radius:50%;background:#0a0f0a;border:2px solid #4caf50;cursor:pointer" title="Forest"></button>
  <button data-theme="ember"    style="width:28px;height:28px;border-radius:50%;background:#0f0a06;border:2px solid #f59e0b;cursor:pointer" title="Ember"></button>
  <div style="font-size:9px;font-weight:700;color:var(--sp-muted);text-transform:uppercase;letter-spacing:1px;width:100%;margin-top:6px;margin-bottom:4px">Light</div>
  <button data-theme="light"    style="width:28px;height:28px;border-radius:50%;background:#f8f9fc;border:2px solid #ff6b35;cursor:pointer" title="Light"></button>
  <button data-theme="sand"     style="width:28px;height:28px;border-radius:50%;background:#faf7f2;border:2px solid #d4640a;cursor:pointer" title="Sand"></button>
  <button data-theme="midnight" style="width:28px;height:28px;border-radius:50%;background:#0a0a1a;border:2px solid #7c6bff;cursor:pointer" title="Midnight"></button>
  <button data-theme="plum"     style="width:28px;height:28px;border-radius:50%;background:#0f0810;border:2px solid #c084fc;cursor:pointer" title="Plum"></button>
</div>
<script src="sp-theme.js"></script>
</body>
</html>

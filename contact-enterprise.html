<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - ProjectCoachAI Forge Edition</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --background: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --accent: #FF4C61;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--background);
            color: var(--text);
            line-height: 1.6;
            padding: 2rem;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 999px;
            color: var(--text);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 2rem;
        }
        
        .back-button:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .header h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .header p {
            font-size: 18px;
            color: var(--text-secondary);
        }
        
        .forge-edition-badge {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 20px;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.3);
        }
        
        /* Privacy Banner */
        .privacy-banner {
            display: flex;
            gap: 15px;
            align-items: center;
            padding: 10px 20px;
            background: rgba(248, 250, 252, 0.05);
            border-top: 1px solid var(--border);
            font-size: 13px;
            justify-content: center;
            flex-wrap: wrap;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        .swiss-privacy-badge,
        .data-handling-notice,
        .company-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--surface);
            border-radius: 20px;
            font-weight: 500;
            font-size: 12px;
        }
        
        .swiss-privacy-badge {
            border: 1px solid #dc2626;
            color: #dc2626;
        }
        
        .data-handling-notice {
            border: 1px solid #059669;
            color: #059669;
        }
        
        .company-badge {
            background: #1e40af;
            color: white;
            border: none;
        }
        
        body {
            padding-bottom: 60px; /* Space for privacy banner */
        }
        
        .contact-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        
        .contact-card h2 {
            font-size: 24px;
            margin-bottom: 1rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
        }
        
        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .submit-btn {
            width: 100%;
            padding: 12px 24px;
            background: linear-gradient(135deg, #FF4C61, #ff2f70);
            color: white;
            border: none;
            border-radius: 999px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 20px rgba(255, 76, 97, 0.35);
        }
        
        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px rgba(255, 76, 97, 0.45);
        }
        
    </style>
</head>
<body>
    <div class="container">
        <button class="back-button" onclick="goBack()">← Back</button>
        
        <div class="header">
            <h1>Contact Us</h1>
            <div class="forge-edition-badge">ProjectCoachAI Forge Edition</div>
            <p>Get in touch with our team</p>
        </div>
        
        <div class="contact-card">
            <h2>Contact Us</h2>
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required placeholder="Your full name">
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="your.email@example.com">
                </div>
                
                <div class="form-group">
                    <label for="comment">Comment</label>
                    <textarea id="comment" name="comment" required placeholder="Your message or inquiry..."></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Enter</button>
            </form>
        </div>
    </div>
    
    <script>
        function goBack() {
            if (window.electronAPI && window.electronAPI.closeWindow) {
                window.electronAPI.closeWindow();
            } else {
                window.close();
            }
        }
        
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            // In production, this would send to your backend API
            console.log('Contact form submitted:', data);
            
            // For now, open email client with the form data
            const subject = encodeURIComponent('Contact Inquiry - ProjectCoachAI');
            const body = encodeURIComponent(
                `Name: ${data.name}\n` +
                `Email: ${data.email}\n\n` +
                `Comment:\n${data.comment}`
            );
            
            const mailtoLink = `mailto:contact@projectcoachai.com?subject=${subject}&body=${body}`;
            
            if (window.electronAPI && window.electronAPI.openExternal) {
                await window.electronAPI.openExternal(mailtoLink);
            } else {
                window.location.href = mailtoLink;
            }
            
            // Show success message
            const submitBtn = e.target.querySelector('.submit-btn');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Sent! ✓';
            submitBtn.disabled = true;
            
            setTimeout(() => {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
                e.target.reset();
            }, 3000);
        });
    </script>
    
    <!-- Privacy Footer -->
    <div class="privacy-banner" style="display: flex; flex-direction: row; align-items: center; justify-content: center; padding: 12px 20px; font-size: 10px; color: var(--text-secondary); line-height: 1.2; text-align: center; white-space: nowrap; overflow: hidden;">
        <span><strong style="color: var(--text); font-size: 11px;">ProjectCoach AI · Forge Edition</strong></span>
        <span style="margin: 0 8px; color: var(--text-secondary);">·</span>
        <span style="font-size: 9px;">A secure workspace for comparing AI outputs. Your analysis, your control.</span>
        <span style="margin: 0 8px; color: var(--text-secondary);">·</span>
        <span style="font-size: 9px;">🇨🇭 Swiss privacy compliant · A Xencore Global company</span>
    </div>
</body>
</html>

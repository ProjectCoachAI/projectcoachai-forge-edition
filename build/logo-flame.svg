<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flameGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4400;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF6600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8800;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="512" cy="512" r="480" fill="url(#flameGradient)" />
  
  <!-- Flame shape -->
  <path d="M 512 200 
           Q 450 250, 400 350
           Q 380 400, 380 450
           Q 380 500, 420 550
           Q 450 580, 480 600
           Q 500 610, 512 620
           Q 524 610, 544 600
           Q 574 580, 604 550
           Q 644 500, 644 450
           Q 644 400, 624 350
           Q 574 250, 512 200 Z" 
        fill="#FFFFFF" 
        opacity="0.95"/>
  
  <!-- Inner flame highlight -->
  <path d="M 512 250 
           Q 470 280, 440 360
           Q 430 400, 430 440
           Q 430 480, 460 520
           Q 480 540, 500 560
           Q 520 540, 540 520
           Q 570 480, 570 440
           Q 570 400, 560 360
           Q 530 280, 512 250 Z" 
        fill="#FFEE00" 
        opacity="0.8"/>
  
  <!-- Flame core -->
  <ellipse cx="512" cy="420" rx="40" ry="80" fill="#FFFFFF" opacity="0.9"/>
</svg>
